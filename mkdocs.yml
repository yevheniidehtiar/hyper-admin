site_name: "HyperAdmin"
site_description: "A modern, Pydantic-native admin interface for FastAPI, powered by HTMX."
site_url: "https://yevheniidehtiar.github.io/hyper-admin"
repo_url: "https://github.com/yevheniidehtiar/hyper-admin"
repo_name: "yevheniidehtiar/hyper-admin"

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.ico
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_root_heading: true
            show_source: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - pymdownx.highlight

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yevheniidehtiar
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/yevheniidehtiar/

nav:
  - Introduction: index.md
  - Getting Started: getting-started.md
  - Tutorial: tutorial.md
  - Examples: examples.md
  - Roadmap: roadmap.md
  - Frontend:
      - Overview: frontend/overview.md
      - Widgets: frontend/widgets.md
      - HTMX Patterns: frontend/htmx_patterns.md
  - API Reference:
      - Overview: api/index.md
      - Application: api/application.md
      - Views: api/views.md
      - Core Components: api/core.md
      - Adapters: api/adapters.md
      - Routing: api/routing.md
  - Design:
      - UI Kit RFC: design/UI-KIT-RFC.md
  - Contributing: contributing.md
  - Changelog: changelog.md
  - Agentic Workflow:
    - CLI Onboarding: agentic-workflow/onboarding.md
    - Overview: agentic-workflow/index.md
    - Cost Model: agentic-workflow/cost-model.md
    - Deep Research Agent: agentic-workflow/deep-research-agent.md
    - Roadmap Planning Agent: agentic-workflow/roadmap-planning-agent.md
    - Dev Agents: agentic-workflow/dev-agents.md
    - Code Review Agent: agentic-workflow/code-review-agent.md
    - QA Agent: agentic-workflow/qa-agent.md
    - Release Agent: agentic-workflow/release-agent.md
    - Scheduled Agent: agentic-workflow/scheduled-agent.md
    - Community Ingestion: agentic-workflow/community-ingestion.md
    - Orchestration: agentic-workflow/orchestration.md
    - OSS Triage Auditor: agentic-workflow/oss-triage-auditor.md
    - Models Setup: agentic-workflow/models-setup.md
    - Issue Proposals:
      - Zero-Config Auth: agentic-workflow/issue-proposals/v0.3.0-zero-config-auth.md
      - File Uploads: agentic-workflow/issue-proposals/v0.3.1-file-uploads.md

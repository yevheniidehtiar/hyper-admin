site_name: "HyperAdmin"
site_description: "A modern, Pydantic-native admin interface for FastAPI, powered by HTMX."
site_url: "https://yevheniidehtiar.github.io/hyper-admin"
repo_url: "https://github.com/yevheniidehtiar/hyper-admin"
repo_name: "yevheniidehtiar/hyper-admin"

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.ico
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_root_heading: true
            show_source: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - pymdownx.highlight

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yevheniidehtiar
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/yevheniidehtiar/

nav:
  - Home: index.md
  - Guide:
      - Getting Started: getting-started.md
      - Tutorial: tutorial.md
      - Examples: examples.md
  - Frontend:
      - Overview: frontend/overview.md
      - Widgets: frontend/widgets.md
      - HTMX Patterns: frontend/htmx_patterns.md
  - API Reference:
      - Overview: api/index.md
      - Application: api/application.md
      - Views: api/views.md
      - Core Components: api/core.md
      - Adapters: api/adapters.md
      - Routing: api/routing.md
  - Community:
      - Contributing: contributing.md
      - Changelog: changelog.md
      - Roadmap: roadmap.md
      - Agentic Workflow:
          - Overview: agentic-workflow/index.md
          - Onboarding:
              - Overview: agentic-workflow/onboarding.md
              - For Humans: agentic-workflow/onboarding-humans.md
              - For Agents: agentic-workflow/onboarding-agents.md
          - Agents:
              - Dev Agents: agentic-workflow/dev-agents.md
              - Code Review: agentic-workflow/code-review-agent.md
              - Deep Research: agentic-workflow/deep-research-agent.md
              - Roadmap Planning: agentic-workflow/roadmap-planning-agent.md
              - QA: agentic-workflow/qa-agent.md
              - Release: agentic-workflow/release-agent.md
              - Scheduled: agentic-workflow/scheduled-agent.md
              - Community Ingestion: agentic-workflow/community-ingestion.md
              - OSS Triage Auditor: agentic-workflow/oss-triage-auditor.md
          - Infrastructure:
              - Orchestration: agentic-workflow/orchestration.md
              - Cost Model: agentic-workflow/cost-model.md
              - Models Setup: agentic-workflow/models-setup.md

services:
  claude:
    build:
      # Context is the project root so COPY pyproject.toml / COPY . . work.
      # Dockerfile.dockerignore (next to the Dockerfile) is picked up by BuildKit.
      context: ../..
      dockerfile: .claude/container/Dockerfile
    # NET_ADMIN is required for init-firewall.sh to apply iptables rules
    cap_add:
      - NET_ADMIN
    environment:
      - ANTHROPIC_API_KEY
      - CLAUDE_GH_TOKEN
      - DISABLE_AUTOUPDATER=1
    volumes:
      # Mount project root so Claude Code operates on live files
      - ../..:/app
    working_dir: /app
    stdin_open: true
    tty: true

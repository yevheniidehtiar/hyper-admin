services:
  claude:
    build:
      # Context is the project root so COPY pyproject.toml / COPY . . work.
      # Dockerfile.dockerignore (next to the Dockerfile) is picked up by BuildKit.
      context: ../..
      dockerfile: .claude/container/Dockerfile
    # NET_ADMIN is required for init-firewall.sh to apply iptables rules
    cap_add:
      - NET_ADMIN
    env_file:
      # Load GITHUB_PAT, SLACK_BOT_TOKEN, etc. from project .env at runtime.
      # Path is relative to the compose file location.
      - ../../.env
    environment:
      # ANTHROPIC_API_KEY is optional when using OAuth (Max subscription).
      # Required only for API-key-based sessions (no remote-control support).
      - ANTHROPIC_API_KEY
      # Bot identity for PR creation (gh CLI)
      - CLAUDE_GH_TOKEN
      - DISABLE_AUTOUPDATER=1
    volumes:
      # Persist OAuth credentials across container restarts.
      # First-time setup: docker compose run --rm claude claude login
      - claude-credentials:/root/.claude
      # Persist gh CLI auth across container restarts
      - gh-config:/root/.config/gh
      # SSH deploy key for git push/pull (generated by `just cc-rotate-key`)
      - ../../.claude/container/ssh:/root/.ssh:ro
    working_dir: /app
    stdin_open: true
    tty: true

volumes:
  # Named volume — survives container stop/rm, isolated from host ~/.claude
  claude-credentials:
  gh-config:

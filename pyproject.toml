[tool.poetry]
name = "hyperadmin"
version = "0.1.0"
description = "A modern, Pydantic-native admin interface for FastAPI, powered by HTMX."
authors = ["Jules"]
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.8"
fastapi = "^0.111.0"
pydantic = "^2.7.1"
uvicorn = {extras = ["standard"], version = "^0.29.0"}
jinja2 = "^3.1.3"
python-multipart = "^0.0.9"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

{%- extends "detail_layout.html" -%}

{%- block detail_title -%}{{ item_name }}{%- endblock -%}

{%- block detail_fields -%}
    <div class="ha-card">
        {%- for key, value in item.items() -%}
        <div class="ha-form-group">
            <label class="ha-label">
                {{- field_labels[key] if field_labels is defined and key in field_labels else key.replace('_', ' ').title() -}}
            </label>
            <div class="ha-field-value">
                {{- value -}}
            </div>
        </div>
        {%- endfor -%}
    </div>
    {%- if actions -%}
    <div class="ha-action-buttons" data-testid="action-buttons">
        {%- for act in actions -%}
        <button
            data-testid="action-{{ act.name }}-btn"
            hx-post="{{- url_for(model_name_lower ~ '-action', item_id=item.id, action_name=act.name) -}}"
            hx-confirm="Run action '{{ act.label }}'?"
            class="ha-btn ha-btn-action"
        >{{ act.label }}</button>
        {%- endfor -%}
    </div>
    {%- endif -%}
    <a href="../" class="ha-text-link">Back to list</a>
{%- endblock -%}

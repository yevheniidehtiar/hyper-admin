{% extends "base.html" %}

{% block content %}
<h1>Update {{ model_name }}</h1>
<form action="{{ url_for(model_name|lower ~ '-update', item_id=item.id) }}" method="post">
    {% for field in fields %}
    {% if field != 'id' %}
    <div class="mb-3">
        <label for="{{ field }}" class="form-label">{{ field.title() }}</label>
        <input type="text" class="form-control" id="{{ field }}" name="{{ field }}" value="{{ item[field] }}">
    </div>
    {% endif %}
    {% endfor %}
    <button type="submit" class="btn btn-primary">Update</button>
</form>
{% endblock %}

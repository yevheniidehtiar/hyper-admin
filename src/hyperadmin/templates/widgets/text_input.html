<div class="form-control">
  <label for="{{ field.name }}" class="form-label">{{ field.label }}{% if field.required %}<span class="req">*</span>{% endif %}</label>
  <input id="{{ field.name }}" name="{{ field.name }}" type="text" value="{{ field.value or '' }}" class="input" aria-invalid="{{ 'true' if field.errors else 'false' }}"
      {% if widget.htmx_attrs %}
        {% for k, v in widget.htmx_attrs.items() %} {{ k }}="{{ v }}"{% endfor %}
      {% endif %}
  />
  {% if field.help_text %}<div class="help" id="{{ field.name }}-help">{{ field.help_text }}</div>{% endif %}
  {% if field.errors %}
    <ul class="errors text-red-500 text-xs italic" aria-live="polite">{% for e in field.errors %}<li>{{ e }}</li>{% endfor %}</ul>
  {% endif %}
</div>

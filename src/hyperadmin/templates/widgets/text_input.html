<div class="ha-form-group">
    <label for="{{- field.name -}}" class="ha-label">
        {{- field.label -}}{%- if field.required -%}<span class="ha-required">*</span>{%- endif -%}
    </label>
    <input id="{{- field.name -}}" {# -#}
           name="{{- field.name -}}" {# -#}
           type="text"
           value="{{- field.value or '' -}}"
           class="ha-input"
           aria-invalid="{{- 'true' if field.errors else 'false' -}}"
            {%- if widget.htmx_attrs -%}
                {%- for k, v in widget.htmx_attrs.items() -%} {{ k }}="{{ v }}"{%- endfor -%}
            {%- endif -%}
    />
    {%- if field.help_text -%}<p class="ha-help-text">{{- field.help_text -}}</p>{%- endif -%}
    {%- if field.errors -%}
        <ul class="ha-field-errors" aria-live="polite">
            {%- for e in field.errors -%}<li>{{- e -}}</li>{%- endfor -%}
        </ul>
    {%- endif -%}
</div>

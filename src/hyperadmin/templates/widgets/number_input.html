{%- from "components/_macros.html" import field_wrapper -%}
{%- set value = field.value if field.value is not none else '' -%}
{%- call field_wrapper(field) -%}
    <input id="{{- field.name -}}" {# -#}
           name="{{- field.name -}}" {# -#}
           type="number"
           value="{{- value -}}"
           class="ha-input"
           aria-invalid="{{- 'true' if field.errors else 'false' -}}"
    />
{%- endcall -%}

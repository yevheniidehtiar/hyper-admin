{% set value = field.value if field.value is not none else '' %}
<div class="form-control">
  <label for="{{ field.name }}" class="form-label">{{ field.label }}{% if field.required %}<span class="req">*</span>{% endif %}</label>
  <input id="{{ field.name }}" name="{{ field.name }}" type="number" value="{{ value }}" class="input" aria-invalid="{{ 'true' if field.errors else 'false' }}" />
  {% if field.errors %}
    <ul class="errors text-red-500 text-xs italic" aria-live="polite">{% for e in field.errors %}<li>{{ e }}</li>{% endfor %}</ul>
  {% endif %}
</div>

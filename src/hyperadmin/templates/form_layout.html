{% extends "base.html" %}

{% block content %}
    <div class="container mx-auto p-4">
        <h2 class="text-2xl font-bold mb-4">{% block form_title %}{% endblock %}</h2>
        <form id="{{ model_name|lower }}-form" {% block form_attributes %}{% endblock %}>
            <div id="{{ model_name|lower }}-form-body" class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4">
                {% block form_body %}{% endblock %}
            </div>
            <div class="mt-4">
                {% block form_actions %}
                <button type="submit" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">Save</button>
                {% endblock %}
            </div>
        </form>
    </div>
{% endblock %}

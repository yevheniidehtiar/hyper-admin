{% macro button(text, hx_verb, hx_url, extra_classes='bg-indigo-600 hover:bg-indigo-700 text-white') %}
<button
    class="font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline {{ extra_classes }}"
    hx-{{ hx_verb }}="{{ hx_url }}"
    hx-confirm="Are you sure?"
>
    {{ text }}
</button>
{% endmacro %}

{% macro link_button(text, url, extra_classes='bg-indigo-600 hover:bg-indigo-700 text-white') %}
<a
    href="{{ url }}"
    class="font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline {{ extra_classes }}"
>
    {{ text }}
</a>
{% endmacro %}

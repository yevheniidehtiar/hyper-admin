{%- if filter_metadata -%}
<div class="ha-card ha-filter-bar" data-testid="filter-bar" x-data="{ filtersOpen: {{ 'true' if active_filters else 'false' }} }">
    <button type="button"
            class="ha-filter-toggle"
            @click="filtersOpen = !filtersOpen"
            aria-controls="filter-content"
            :aria-expanded="filtersOpen">
        <svg class="ha-icon ha-icon-sm" :class="filtersOpen ? 'rotate-180' : 'rotate-0'" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19 9l-7 7-7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Filters
    </button>

    <div id="filter-content" class="ha-filter-content" x-show="filtersOpen" x-cloak>
        <div class="ha-filter-container">
            {%- for filter in filter_metadata -%}
            <div class="ha-form-group ha-filter-group">
                <label class="ha-label" for="filter-{{ filter.name }}">{{ filter.label }}</label>
                <select id="filter-{{ filter.name }}"
                        name="filter_{{ filter.name }}"
                        class="ha-select"
                        data-testid="filter-{{ filter.name }}"
                        hx-get="{{- url_for(model_name|lower ~ '-list') -}}"
                        hx-target="#model-list"
                        hx-push-url="true"
                        hx-include="[name^='filter_'], [name='search'], [name='sort_by'], [name='sort_direction']">
                    <option value="">Any</option>
                    {%- for choice in filter.choices -%}
                    <option value="{{ choice.value }}" {% if active_filters.get(filter.name) == choice.value|string %}selected{% endif %}>
                        {{- choice.label -}}
                    </option>
                    {%- endfor -%}
                </select>
            </div>
            {%- endfor -%}

            <div class="ha-filter-clear">
                <a href="{{- url_for(model_name|lower ~ '-list') }}?search={{ search_query }}&sort_by={{ sort_by }}&sort_direction={{ sort_direction -}}"
                   class="ha-btn-link"
                   hx-get="{{- url_for(model_name|lower ~ '-list') }}?search={{ search_query }}&sort_by={{ sort_by }}&sort_direction={{ sort_direction -}}"
                   hx-target="#model-list"
                   hx-push-url="true">
                    Clear all filters
                </a>
            </div>
        </div>
    </div>
</div>
{%- endif -%}

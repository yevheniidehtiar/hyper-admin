{% extends "base.html" %}

{% block title %}Login | HyperAdmin{% endblock %}

{% block content %}
<div class="ha-login-container" style="max-width: 400px; margin: 100px auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
    <h1>Admin Login</h1>

    {% if error %}
    <div role="alert" style="color: red; margin-bottom: 20px;">
        {{ error }}
    </div>
    {% endif %}

    <form method="post" data-testid="login-form">
        <div style="margin-bottom: 15px;">
            <label for="username" style="display: block; margin-bottom: 5px;">Username</label>
            <input type="text" id="username" name="username" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label for="password" style="display: block; margin-bottom: 5px;">Password</label>
            <input type="password" id="password" name="password" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
        </div>
        <button type="submit" style="width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">
            Login
        </button>
    </form>
</div>
{% endblock %}

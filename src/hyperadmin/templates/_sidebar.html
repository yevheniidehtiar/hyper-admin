<aside class="ha-sidebar" data-testid="sidebar">
    <div class="ha-sidebar-inner">
        <h2 class="ha-sidebar-title">Menu</h2>
        <ul class="ha-sidebar-nav">
            {%- for item in nav_items -%}
            <li>
                <a href="{{ admin_prefix }}{{ item.url }}" class="ha-sidebar-link">
                    {%- if item.icon -%}
                    <i class="{{ item.icon }}"></i>
                    {%- endif -%}
                    {{ item.name }}
                </a>
            </li>
            {%- endfor -%}
        </ul>
    </div>
</aside>

<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{% block title %}HyperAdmin{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='dist/css/output.css') }}">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script>
      // Allow HTMX to process 422 (Unprocessable Entity) responses by forcing a swap
      // and treating the response as a normal (non-error) update. This is the
      // recommended pattern from the HTMX docs for server-side validation.
      document.addEventListener('htmx:beforeSwap', function (evt) {
        try {
          var xhr = evt.detail && evt.detail.xhr;
          if (xhr && xhr.status === 422) {
            // Force swap of the response HTML into the target and clear error state
            evt.detail.shouldSwap = true;
            evt.detail.isError = false;
            // Fallback: ensure the target gets updated even if default swapping is skipped
            var target = evt.detail && evt.detail.target;
            if (target && typeof xhr.responseText === 'string') {
              requestAnimationFrame(function(){ target.innerHTML = xhr.responseText; });
            }
          }
        } catch (e) {
          // no-op: defensive guard to avoid breaking the page if something goes wrong
        }
      });
    </script>
    {% block head %}{% endblock %}
</head>
<body
    x-data="{ page: 'ecommerce', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
>
<!-- ===== Preloader Start ===== -->
{% include 'tailadmin/partials/preloader.html' %}
<!-- ===== Preloader End ===== -->

<!-- ===== Page Wrapper Start ===== -->
<div class="flex h-screen overflow-hidden">
    <!-- ===== Sidebar Start ===== -->
    {% include 'tailadmin/partials/sidebar.html' %}
    <!-- ===== Sidebar End ===== -->

    <!-- ===== Content Area Start ===== -->
    <div
        class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto"
    >
        <!-- ===== Header Start ===== -->
        {% include 'tailadmin/partials/header.html' %}
        <!-- ===== Header End ===== -->

        <!-- ===== Main Content Start ===== -->
        <main>
            <div class="p-4 mx-auto max-w-screen-2xl md:p-6 2xl:p-10">
                {% block content %}{% endblock %}
            </div>
        </main>
        <!-- ===== Main Content End ===== -->
    </div>
    <!-- ===== Content Area End ===== -->
</div>
<!-- ===== Page Wrapper End ===== -->
<script src="{{ url_for('static', path='dist/main.js') }}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HyperAdmin{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script>
      // Allow HTMX to process 422 (Unprocessable Entity) responses by forcing a swap
      // and treating the response as a normal (non-error) update. This is the
      // recommended pattern from the HTMX docs for server-side validation.
      document.addEventListener('htmx:beforeSwap', function (evt) {
        try {
          var xhr = evt.detail && evt.detail.xhr;
          if (xhr && xhr.status === 422) {
            // Force swap of the response HTML into the target and clear error state
            evt.detail.shouldSwap = true;
            evt.detail.isError = false;
            // Fallback: ensure the target gets updated even if default swapping is skipped
            var target = evt.detail && evt.detail.target;
            if (target && typeof xhr.responseText === 'string') {
              requestAnimationFrame(function(){ target.innerHTML = xhr.responseText; });
            }
          }
        } catch (e) {
          // no-op: defensive guard to avoid breaking the page if something goes wrong
        }
      });
    </script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/output.css') }}">
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-4">
        {% include "_messages.html" %}
        {% include "_navbar.html" %}
        <div class="flex">
            {% include "_sidebar.html" %}
            <main class="flex-1 p-6 bg-gray-50">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
</body>
</html>

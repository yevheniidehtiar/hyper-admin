
name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - run: uv pip install mkdocs-material mkdocstrings[python] --system
      - run: mkdocs build --strict
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site/
      - uses: actions/deploy-pages@v4
        id: deployment


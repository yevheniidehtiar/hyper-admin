
name: Release Agent

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version (patch/minor/major/x.y.z)'
        required: true
        default: 'patch'

permissions:
  contents: write
  id-token: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --all-extras
      - name: Release Candidate Report
        if: false # TODO: Enable after setting up ANTHROPIC_API_KEY
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Analyze the project's readiness for version #{{ github.event.inputs.version }}.
            Review closed issues in the current milestone, QA results, and changelog.
            Produce a Release Candidate (RC) report as specified in docs/agentic-workflow/release-agent.md.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Automated Bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          uv run cz bump --yes
          git push origin main --tags


name: Test

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        resolution-strategy: ["highest"]

    name: Python ${{ matrix.python-version }} (resolution=${{ matrix.resolution-strategy }})

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23

      - name: Install @devcontainers/cli
        run: npm install --location=global @devcontainers/cli@0.76.0

      - name: Start Dev Container
        run: |
          git config --global init.defaultBranch main
          devcontainer up --workspace-folder .
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
          RESOLUTION_STRATEGY: ${{ matrix.resolution-strategy }}

      - name: Lint package
        run: devcontainer exec --workspace-folder . poe lint
      
      - name: Security checks 
        run: devcontainer exec --workspace-folder . poe security-check

      - name: Test package
        run: devcontainer exec --workspace-folder . poe test:unit
      
      - name: E2E Test package
        run: devcontainer exec --workspace-folder . poe test:e2e
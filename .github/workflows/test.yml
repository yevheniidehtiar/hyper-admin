name: Test

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
        resolution: ["highest", "lowest-direct", "lowest"]

    name: Python ${{ matrix.python-version }} (resolution=${{ matrix.resolution }})

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
        shell: bash

      - name: Install dependencies
        run: uv sync --all-extras --resolution ${{ matrix.resolution }}

      - name: Lint package
        run: uv run poe lint

      - name: Test package
        run: uv run poe test:unit

      - name: Security checks 
        run: uv run poe security-check

      - name: Test package
        run: uv run poe test:unit
      
      - name: E2E Test package
        run: uv run poe test:e2e

name: Test

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
        resolution: ["highest", "lowest-direct", "lowest"]

    name: Python ${{ matrix.python-version }} (resolution=${{ matrix.resolution }})

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
        shell: bash

      - name: Install dependencies
        run: uv sync --all-extras --resolution ${{ matrix.resolution }}

      - name: Add `test:unit` poe task
        run: |
          pip install poethepoet
          poe --version
          python -c "import toml; pyproject = toml.load('pyproject.toml'); pyproject['tool']['poe']['tasks']['test:unit'] = {'help': 'Run unit tests with Pytest', 'cmd': 'pytest --ignore=tests/e2e'}; toml.dump(pyproject, open('pyproject.toml', 'w'))"

      - name: Lint package
        run: poe lint

      - name: Test package
        run: poe test:unit
